name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. เพิ่มขั้นตอนนี้ เพื่อติดตั้ง Flutter ลงในเซิร์ฟเวอร์ของ GitHub Actions ก่อน
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 2. จากนั้นถึงจะสั่งรันดึงแพ็กเกจและ Build Web ได้อย่างถูกต้อง
      - run: flutter pub get && flutter build web

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBBOARDAPP_3E283 }}
          channelId: live
          projectId: webboardapp-3e283